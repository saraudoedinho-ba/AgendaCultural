<div class="confirmacao-container">
  <div class="confirmacao-card">
    <h1>Agendamento Realizado!</h1>

    <p>
      Você contratou um serviço musical, <span class="texto-destaque">você receberá um e-mail</span> com instruções de pagamento e o músico também receberá os dados de contato para que vocês possam combinar o evento.
    </p>

    <div class="acoes">
      <button type="button" class="btn btn-secundario" (click)="voltarAgenda()">
        Voltar à Agenda
      </button>
      <button type="button" class="btn btn-primario" (click)="irHome()">
        Home
      </button>
    </div>
  </div>
</div>
