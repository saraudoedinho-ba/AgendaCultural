<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <h1>Login</h1>
      <p>Acesse o Dashboard</p>
    </div>

    <form class="login-form" (submit)="login(); $event.preventDefault()">
      @if (erro) {
        <div class="erro-message">
          {{ erro }}
        </div>
      }

      <div class="form-group">
        <label>E-mail</label>
        <input 
          type="email" 
          class="form-input" 
          [(ngModel)]="email" 
          name="email"
          placeholder="seu@email.com"
          required />
      </div>

      <div class="form-group">
        <label>Senha</label>
        <input 
          type="password" 
          class="form-input" 
          [(ngModel)]="senha" 
          name="senha"
          placeholder="******"
          required />
      </div>

      <div class="login-info">
        <p><strong>Conectando ao servidor:</strong></p>
        <p>Aguarde a resposta do servidor de autenticação</p>
      </div>

      <button type="submit" class="btn-login" [disabled]="carregando">
        {{ carregando ? 'AGUARDE...' : 'ENTRAR' }}
      </button>
      <button type="button" class="btn-voltar" (click)="voltar()" [disabled]="carregando">VOLTAR</button>
    </form>
  </div>
</div>
