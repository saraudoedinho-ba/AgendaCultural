<!-- Header -->
<header class="header">
  <div class="header-content ">
    <div class="logo" (click)="navigateToHome()" style="cursor: pointer; width:100%" >
      <img src="/assets/images/logo.png" alt="Agenda Musical Logo" class="logo-img">
    </div>
    
    <!-- Botão Hamburguer (Mobile) -->
    <button class="btn-hamburguer" (click)="toggleMenu()" [class.aberto]="menuAberto">
      <span></span>
      <span></span>
      <span></span>
    </button>
    
    <div class="header-right">
      <div class="header-info" >
        <div class="header-text" >
          <h1>Encontre o artista<br>perfeito para seu evento</h1>
          <p class="subtitle">Músicos e Bandas em qualquer lugar do Brasil</p>
        </div>
        <div class="header-buttons">
          <button class="btn btn-white" (click)="navigateToCadastroArtistas()">CADASTRO PARA ARTISTAS</button>
          <button class="btn btn-white" (click)="navigateToEncontrarArtista()">ENCONTRAR UM ARTISTA</button>
        </div>
      </div>
    </div>
  </div>
  
  <!-- Menu Mobile -->
  @if (menuAberto) {
  <div class="menu-mobile-overlay" (click)="fecharMenu()">
    <nav class="menu-mobile" (click)="$event.stopPropagation()">
      <button class="menu-item" (click)="navigateToHome()">
        <svg class="menu-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
          <polyline points="9 22 9 12 15 12 15 22"></polyline>
        </svg>
        <span>Home</span>
      </button>
      <button class="menu-item" (click)="navigateToDashboard()">
        <svg class="menu-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7"></rect>
          <rect x="14" y="3" width="7" height="7"></rect>
          <rect x="14" y="14" width="7" height="7"></rect>
          <rect x="3" y="14" width="7" height="7"></rect>
        </svg>
        <span>Perfil do Artista</span>
      </button>
      <button class="menu-item" (click)="navigateToEncontrarArtista()">
        <svg class="menu-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"></circle>
          <path d="m21 21-4.35-4.35"></path>
        </svg>
        <span>Encontrar Artista</span>
      </button>
      <button class="menu-item" (click)="navigateToCadastroArtistas()">
        <svg class="menu-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 5v14M5 12h14"></path>
        </svg>
        <span>Cadastro para Artistas</span>
      </button>
    </nav>
  </div>
  }
</header>
