<div class="perfil-grid">
  <div class="perfil-card" *ngFor="let categoria of categorias">
    <!-- Background Gradient and Icon -->
    <div class="card-body">
      <div class="icon-overlay">
        <span class="category-icon" [innerHTML]="categoria.icon"></span>
      </div>
      <h3 class="category-title">{{ categoria.nome }}</h3>
    </div>
    
    <!-- Footer with Button -->
    <div class="card-footer">
      <button class="btn-ver-perfis">VER PERFIS</button>
    </div>
  </div>
</div>
