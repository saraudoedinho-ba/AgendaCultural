<div class="perfil-grid">
  <div class="perfil-card" *ngFor="let categoria of categorias">
        <!-- Background Image -->
    <div class="card-body" [style.backgroundImage]="'url(' + categoria.imagem + ')'">
    </div>
    
    <!-- Footer with Button -->
    <div class="card-footer">
      <button class="btn-ver-perfis">VER PERFIS</button>
    </div>
  </div>
</div>
